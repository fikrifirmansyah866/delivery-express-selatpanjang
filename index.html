<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Delivery Express Selatpanjang</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>Delivery Express</header>

<div class="container" id="loginPage">
  <h3>Login</h3>
  <input type="text" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div class="container" id="homePage" style="display:none;">
  <div class="menu" onclick="showOrder()">Ojek Online</div>
  <div class="menu">Delivery Barang</div>
  <div class="menu">Pesan Makanan</div>
</div>

<div class="container" id="orderPage" style="display:none;">
  <h3>Pesan Ojek</h3>
  <input type="text" id="pickup" placeholder="Lokasi Jemput">
  <input type="text" id="dropoff" placeholder="Tujuan">
  <button onclick="order()">Pesan Sekarang</button>
</div>

<script src="script.js"></script>
</body>
    </html>
